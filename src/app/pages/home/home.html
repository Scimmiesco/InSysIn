<div class="stats">
    <p>
        {{((sys_info()?.used_memory ?? 0 )/ 1000000000 )| number:'1.0-2' }} GB
    </p>
    <p>
        {{((sys_info()?.total_memory ?? 0 )/ 1000000000 )| number:'1.0-2' }} GB
    </p>
    <p>
        {{(((sys_info()?.used_memory ?? 0) / (sys_info()?.total_memory ?? 0)) *
        100) | number:'1.0-2' }} %
    </p>
</div>
